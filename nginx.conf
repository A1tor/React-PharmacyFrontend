server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any unknown path returns index.html so the React app handles routing.
  location / {
    try_files $uri /index.html;
  }

  # API -> backend. Edit the backend host below for your deployment target
  # (e.g. host.docker.internal for local Docker on Windows/Mac, or a real hostname).
  location ~ ^/(auth|user|storage|product|request|country|batch)(/|$) {
    proxy_pass http://host.docker.internal:8082;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
